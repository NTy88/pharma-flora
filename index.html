<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PharmaFlora - Học tên khoa học dược liệu</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div id="app">
        <!-- Sidebar/Navigation -->
        <nav class="sidebar">
            <div class="logo">
                <i data-lucide="leaf" class="icon-logo"></i>
                <span>PharmaFlora</span>
            </div>
            <ul class="nav-links">
                <li class="active" data-view="dashboard">
                    <i data-lucide="layout-dashboard"></i> <span>Tổng quan</span>
                </li>
                <li data-view="flashcards">
                    <i data-lucide="layers"></i> <span>Flashcards</span>
                </li>
                <li data-view="quiz">
                    <i data-lucide="brain-circuit"></i> <span>Kiểm tra</span>
                </li>
                <li data-view="search">
                    <i data-lucide="search"></i> <span>Tra cứu</span>
                </li>
            </ul>
            <div class="progress-container">
                <p>Tiến độ học tập</p>
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 0%"></div>
                </div>
                <span id="progress-text">0/60 cây</span>
            </div>
        </nav>

        <!-- Main Content -->
        <main class="content">
            <header>
                <h1 id="view-title">Chào buổi sáng!</h1>
                <p id="view-desc">Hãy bắt đầu hành trình chinh phục 60 loài cây dược liệu nào.</p>
            </header>

            <section id="main-view" class="view-container">
                <!-- Content will be injected here by app.js -->
            </section>
        </main>
    </div>

    <!-- Modal Chi tiết -->
    <div id="plant-modal" class="modal-overlay">
        <div class="modal-content">
            <i data-lucide="x" class="close-modal" onclick="closeModal()"></i>
            <div id="modal-body"></div>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        lucide.createIcons();
    </script>
</body>
</html>
